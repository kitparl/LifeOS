services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lifeos-postgres
    environment:
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
      POSTGRES_DB: lifeos
    ports:
      - "5432:5432"
    volumes:
      - lifeos_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lifeos-redis
    ports:
      - "6379:6379"

volumes:
  lifeos_pg_data:
